{% extends "base.html" %}
{% block content %}

<div class="row">
    <div class="col-md-8 offset-md-2">
        <h3 class="mb-4"><i class="bi bi-person-circle"></i> My Profile</h3>

        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" value="{{ user[1] }}" disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="email" value="{{ user[3] or '' }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" name="phone" value="{{ user[4] or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" name="city" value="{{ user[7] or '' }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-9 mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" name="address" rows="3">{{ user[5] or '' }}</textarea>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Pincode</label>
                            <input type="text" class="form-control" name="pincode" value="{{ user[7] or '' }}">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i> Save Changes
                        </button>
                        <a href="/my-orders" class="btn btn-outline-success">
                            <i class="bi bi-bag"></i> View Orders
                        </a>
                        <a href="/wishlist" class="btn btn-outline-primary">
                            <i class="bi bi-heart"></i> My Wishlist
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- ACCOUNT INFO -->
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-info-circle"></i> Account Information</h5>
                <ul class="list-unstyled">
                    <li><strong>Member Since:</strong> {{ user[8] if user[8] else 'Just now' }}</li>
                    <li><strong>Status:</strong> <span class="badge bg-success">Active</span></li>
                </ul>
            </div>
        </div>
    </div>
</div>

{% endblock %}
