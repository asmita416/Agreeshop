<!DOCTYPE html>
<html>
<head>
    <title>AgriShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-success p-3">
    <a class="navbar-brand text-white" href="/">🌾 AgriShop</a>
    <div class="ms-auto">
        <a href="/cart" class="text-white me-3">Cart</a>
        {% if session.get('user') %}
            <a href="/admin" class="text-white me-3">Admin</a>
            <a href="/logout" class="text-white">Logout ({{ session.get('user') }})</a>
        {% else %}
            <a href="/login" class="text-white me-3">Login</a>
            <a href="/register" class="text-white">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
